  <script>
(function () {
  const viewport = document.getElementById("viewport");
  const stage = document.getElementById("stage");
  const svg = stage.querySelector("svg");
  if (!svg) return;

  let scale = 1;
  let panX = 0;
  let panY = 0;
  let dragging = false;
  let lastX = 0;
  let lastY = 0;

  function applyTransform() {
    stage.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  }

  function fitToScreen() {
    const vb = svg.viewBox.baseVal;
    const sw = vb.width || svg.width.baseVal.value || 1200;
    const sh = vb.height || svg.height.baseVal.value || 900;
    const vw = viewport.clientWidth;
    const vh = viewport.clientHeight;
    scale = Math.min(vw / sw, vh / sh) * 0.95;
    panX = (vw - sw * scale) / 2;
    panY = (vh - sh * scale) / 2;
    applyTransform();
  }

  function zoomAt(cx, cy, factor) {
    const rect = viewport.getBoundingClientRect();
    const mx = cx - rect.left;
    const my = cy - rect.top;
    const newScale = Math.max(0.05, Math.min(40, scale * factor));
    panX = mx - (mx - panX) * (newScale / scale);
    panY = my - (my - panY) * (newScale / scale);
    scale = newScale;
    applyTransform();
  }

  viewport.addEventListener("wheel", (e) => {
    e.preventDefault();
    zoomAt(e.clientX, e.clientY, e.deltaY < 0 ? 1.15 : 1 / 1.15);
  }, { passive: false });

  viewport.addEventListener("mousedown", (e) => {
    if (e.button !== 0) return;
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
    viewport.classList.add("dragging");
  });
  window.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    panX += e.clientX - lastX;
    panY += e.clientY - lastY;
    lastX = e.clientX;
    lastY = e.clientY;
    applyTransform();
  });
  window.addEventListener("mouseup", () => {
    dragging = false;
    viewport.classList.remove("dragging");
  });

  document.getElementById("zoom-in").onclick = () => {
    const r = viewport.getBoundingClientRect();
    zoomAt(r.left + r.width / 2, r.top + r.height / 2, 1.25);
  };
  document.getElementById("zoom-out").onclick = () => {
    const r = viewport.getBoundingClientRect();
    zoomAt(r.left + r.width / 2, r.top + r.height / 2, 0.8);
  };
  document.getElementById("fit").onclick = fitToScreen;
  document.getElementById("reset").onclick = () => {
    scale = 1; panX = 20; panY = 20; applyTransform();
  };

  window.addEventListener("resize", fitToScreen);
  fitToScreen();
})();
  </script>
